kind = "web"
previewPath = "/"
title = "PawTrack"
version = "1.0.0"
id = "artifacts/pawtrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22887

[services.development]
run = "pnpm --filter @workspace/pawtrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawtrack", "run", "build" ]
publicDir = "artifacts/pawtrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22887"
BASE_PATH = "/"
